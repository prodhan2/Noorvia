name: noorvia
description: "Noorvia - Islamic App in Bangla"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  http: ^1.2.2
  audioplayers: ^6.1.0
  flutter_cache_manager: ^3.4.1
  workmanager: ^0.5.2
  connectivity_plus: ^6.1.4
  flutter_svg: ^2.0.10+1
  flutter_markdown: ^0.7.4
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  geolocator: ^13.0.2
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
